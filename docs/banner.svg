<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <style>
      .title { font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; fill: #e2e8f0; }
      .sub   { font-family: 'Courier New', monospace; font-size: 13px; fill: #94a3b8; }
      .label { font-family: 'Courier New', monospace; font-size: 10px; fill: #64748b; }
      .cls   { font-family: 'Courier New', monospace; font-size: 9px; fill: #f1f5f9; }
      .acc   { font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; fill: #4ade80; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" fill="#0f172a" rx="10"/>
  <rect width="900" height="160" fill="url(#grid)" rx="10" opacity="0.3"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#1e293b" stroke-width="1"/>
  <line x1="180" y1="0" x2="180" y2="160" stroke="#1e293b" stroke-width="1"/>
  <line x1="540" y1="0" x2="540" y2="160" stroke="#1e293b" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="160" fill="#6366f1" rx="2"/>

  <!-- Title block -->
  <text x="28" y="58" class="title">CIFAR-10 Image Classifier</text>
  <text x="28" y="82" class="sub">Convolutional Neural Network  ·  TensorFlow 2.15  ·  ~80% Test Accuracy</text>
  <text x="28" y="108" class="label">▸ 1.34M parameters  ·  3 conv blocks  ·  batch norm + dropout  ·  data augmentation</text>
  <text x="28" y="130" class="label">▸ pytest test suite  ·  GitHub Actions CI  ·  CLI predictor  ·  confusion matrix</text>

  <!-- Class pills on right -->
  <g transform="translate(560, 20)">
    <!-- Row 1 -->
    <rect x="0"   y="0"  width="68" height="20" rx="10" fill="#1e3a5f"/>
    <text x="34"  y="14" text-anchor="middle" class="cls">✈ airplane</text>
    <rect x="76"  y="0"  width="76" height="20" rx="10" fill="#3b1f5e"/>
    <text x="114" y="14" text-anchor="middle" class="cls">🚗 automobile</text>
    <rect x="160" y="0"  width="56" height="20" rx="10" fill="#1a3d2b"/>
    <text x="188" y="14" text-anchor="middle" class="cls">🐦 bird</text>
    <rect x="224" y="0"  width="48" height="20" rx="10" fill="#3d2020"/>
    <text x="248" y="14" text-anchor="middle" class="cls">🐱 cat</text>
    <rect x="280" y="0"  width="52" height="20" rx="10" fill="#1a3d1a"/>
    <text x="306" y="14" text-anchor="middle" class="cls">🦌 deer</text>

    <!-- Row 2 -->
    <rect x="0"   y="28" width="48" height="20" rx="10" fill="#3d2a10"/>
    <text x="24"  y="42" text-anchor="middle" class="cls">🐶 dog</text>
    <rect x="56"  y="28" width="52" height="20" rx="10" fill="#1a3d1a"/>
    <text x="82"  y="42" text-anchor="middle" class="cls">🐸 frog</text>
    <rect x="116" y="28" width="60" height="20" rx="10" fill="#3d2a10"/>
    <text x="146" y="42" text-anchor="middle" class="cls">🐴 horse</text>
    <rect x="184" y="28" width="52" height="20" rx="10" fill="#1e3a5f"/>
    <text x="210" y="42" text-anchor="middle" class="cls">🚢 ship</text>
    <rect x="244" y="28" width="56" height="20" rx="10" fill="#3b1f5e"/>
    <text x="272" y="42" text-anchor="middle" class="cls">🚚 truck</text>

    <!-- Accuracy stat -->
    <text x="168" y="88" text-anchor="middle" class="label">Test Accuracy</text>
    <text x="168" y="110" text-anchor="middle" class="acc">~80%</text>

    <!-- Divider -->
    <line x1="0" y1="68" x2="336" y2="68" stroke="#1e293b" stroke-width="1"/>
  </g>
</svg>
